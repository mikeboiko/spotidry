name: Publish to PyPI

on:
  workflow_run:
    workflows: ['Tests']
    types:
      - completed
    branches:
      - master
jobs:
  build-n-publish:
    name: Build and publish to PyPI
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event != 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Detect release version bump
        id: release_check
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1 && git diff --quiet HEAD^ HEAD -- spotidry/__init__.py; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.release_check.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Determine release version
        if: steps.release_check.outputs.should_release == 'true'
        id: release_meta
        run: |
          python - <<'PY' >>"$GITHUB_OUTPUT"
          from pathlib import Path
          import re

          text = Path('spotidry/__init__.py').read_text(encoding='utf-8')
          match = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
          if match is None:
              raise SystemExit('Unable to determine project version from spotidry/__init__.py')

          version = match.group(1)
          print(f'version={version}')
          print(f'tag={version}')
          PY

      - name: Create release tag
        if: steps.release_check.outputs.should_release == 'true'
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          git fetch --force --tags origin

          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
              echo "::error::Tag ${RELEASE_TAG} already exists on ${TAG_SHA}. Bump spotidry/__init__.py before merging to master."
              exit 1
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${HEAD_SHA}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Install build dependencies
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        if: steps.release_check.outputs.should_release == 'true'
        run: python -m build

      - name: Check package with Twine
        if: steps.release_check.outputs.should_release == 'true'
        run: twine check dist/*

      - name: Create GitHub Release
        if: steps.release_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: dist/*
          generate_release_notes: true

      - name: Publish to PyPI
        if: steps.release_check.outputs.should_release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
